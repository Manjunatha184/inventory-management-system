<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Inventory</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  
  
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 40px; padding: 0 8px; letter-spacing: -0.5px;">
        Inventory<span style="color: var(--primary);">Sys</span>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/employee-dashboard" class="sidebar-link">Dashboard</a>
      <a href="/employee-inventory" class="sidebar-link active">Browse Inventory</a>
      <a href="/employee-requests" class="sidebar-link">My Requests</a>
      <a href="/employee-owned" class="sidebar-link">My Items</a>
          </nav>
      <div style="margin-top: auto; padding-top: 24px;">
        <a href="#" class="sidebar-link" style="color: var(--danger);" onclick="logout()">
          <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <div>
              <h1>Browse Inventory</h1>
              <p>Request resources you need</p>
            </div>
          </div>
        </div>
        
        <div class="grid" id="itemsGrid">
          <div class="loading">Loading inventory...</div>
        </div>
      </div>
    </main>
  </div>
  
  <div class="modal" id="requestModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Request Item</h3>
      </div>
      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input type="text" id="modalItemName" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" id="modalQty" value="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Reason</label>
        <textarea id="modalReason" placeholder="Why do you need this?" style="min-height:100px"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeRequestModal()">Cancel</button>
        <button class="btn" onclick="submitRequest()">Submit Request</button>
      </div>
    </div>
  </div>
  
  <script src="/auth.js"></script>
  <script>
    checkAuth('employee');
    
    let currentItemId = null;
    
    function openRequestModal(id, name) {
      currentItemId = id;
      document.getElementById('modalItemName').value = name;
      document.getElementById('modalQty').value = '1';
      document.getElementById('modalReason').value = '';
      document.getElementById('requestModal').classList.add('active');
    }
    
    function closeRequestModal() {
      document.getElementById('requestModal').classList.remove('active');
    }
    
    async function submitRequest() {
      const qty = document.getElementById('modalQty').value;
      const reason = document.getElementById('modalReason').value;
      
      if (!qty) {
        alert('Please enter quantity');
        return;
      }
      
      const response = await fetch('/api/employee/requests', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-session-id': localStorage.getItem('sessionId')
        },
        body: JSON.stringify({ itemId: currentItemId, quantity: qty, reason })
      });
      
      const data = await response.json();
      if (data.status === 'success') {
        closeRequestModal();
        alert('Request submitted successfully!');
        loadInventory();
      } else {
        alert(data.message);
      }
    }
    
    async function loadInventory() {
      const response = await fetch('/api/employee/inventory', {
        headers: { 'x-session-id': localStorage.getItem('sessionId') }
      });
      
      const data = await response.json();
      if (data.status === 'success') {
        const html = data.data.map(item => `
          <div class="card" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
            <div>
              <h4 style="font-size: 16px; margin-bottom: 12px;">${item.name}</h4>
              <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;">
                <span class="badge badge-neutral">${item.category}</span>
                <span class="badge badge-neutral">${item.quantity} Avail</span>
                <span class="badge badge-approved">$${item.price}</span>
                <span class="badge badge-neutral">${item.condition}</span>
              </div>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top: auto;" onclick="openRequestModal('${item.id}', '${item.name}')">Request Item</button>
          </div>
        `).join('');
        
        document.getElementById('itemsGrid').innerHTML = html;
      }
    }
    
    loadInventory();
  </script>
</body>
</html>
