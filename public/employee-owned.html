<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Items</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  
  
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 40px; padding: 0 8px; letter-spacing: -0.5px;">
        Inventory<span style="color: var(--primary);">Sys</span>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/employee-dashboard" class="sidebar-link">Dashboard</a>
      <a href="/employee-inventory" class="sidebar-link">Browse Inventory</a>
      <a href="/employee-requests" class="sidebar-link">My Requests</a>
      <a href="/employee-owned" class="sidebar-link active">My Items</a>
          </nav>
      <div style="margin-top: auto; padding-top: 24px;">
        <a href="#" class="sidebar-link" style="color: var(--danger);" onclick="logout()">
          <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <div>
              <h1>My Items</h1>
              <p>Items assigned to you</p>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Serial Number</th>
                  <th>Assigned Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="myItemsList">
                <tr><td colspan="3" class="loading">Loading items...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/auth.js"></script>
  <script>
    checkAuth('employee');
    
    async function loadMyItems() {
      try {
        const response = await fetch('/api/employee/my-items', {
          headers: { 'x-session-id': localStorage.getItem('sessionId') }
        });
        
        const data = await response.json();
        if (data.status === 'success') {
          if (data.data.length === 0) {
            document.getElementById('myItemsList').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px">You have no items assigned</td></tr>';
            return;
          }
          const html = data.data.map(item => `
            <tr>
              <td><strong>${item.itemName}</strong></td>
              <td><span style="font-family: monospace; background: #F1F5F9; padding: 4px 8px; border-radius: 6px; font-size: 0.9em; border: 1px solid #E2E8F0; color: #475569;">${item.serialNumber}</span></td>
              <td>${item.assignedDate}</td>
              <td>
                <button class="btn btn-sm" style="background:#f59e0b; color:white; border:none; padding:4px 8px; border-radius:4px" onclick="returnItem('${item.serialNumber}')">Return Item</button>
              </td>
            </tr>
          `).join('');
          
          document.getElementById('myItemsList').innerHTML = html;
        } else {
           document.getElementById('myItemsList').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color: red;">Failed to load items.</td></tr>';
        }
      } catch (e) {
         document.getElementById('myItemsList').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color: red;">Failed to load items.</td></tr>';
      }
    }
    
    async function returnItem(id) {
      if (!confirm('Are you sure you want to return this assigned item back to company inventory?')) return;
      const response = await fetch(`/api/employee/my-items/${id}/return`, {
        method: 'POST',
        headers: { 'x-session-id': localStorage.getItem('sessionId') }
      });
      const data = await response.json();
      if (data.status === 'success') {
        alert('Item effectively returned to company inventory!');
        loadMyItems();
      } else {
        alert(data.message);
      }
    }
    
    loadMyItems();
  </script>
</body>
</html>
