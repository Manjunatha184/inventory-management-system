<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  
  
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 40px; padding: 0 8px; letter-spacing: -0.5px;">
        Inventory<span style="color: var(--primary);">Sys</span>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/admin-dashboard" class="sidebar-link active">Dashboard</a>
      <a href="/admin-employees" class="sidebar-link">Employees</a>
      <a href="/admin-inventory" class="sidebar-link">Inventory</a>
      <a href="/admin-requests" class="sidebar-link">Requests</a>
          </nav>
      <div style="margin-top: auto; padding-top: 24px;">
        <a href="#" class="sidebar-link" style="color: var(--danger);" onclick="logout()">
          <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <div>
              <h1>Dashboard</h1>
              <p>Welcome back, <strong id="userName"></strong></p>
            </div>
          </div>
        </div>
        
        <div class="grid">
          <div class="stat-card">
            <div class="stat-label">Total Employees</div>
            <div class="stat-value" id="totalEmployees">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Items</div>
            <div class="stat-value" id="totalItems">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Inventory Value</div>
            <div class="stat-value" id="totalValue">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Requests</div>
            <div class="stat-value" id="pendingRequests">-</div>
          </div>
        </div>

        <div class="card" style="margin-top: 24px">
          <div class="card-header">
            <h3 style="color: var(--danger); display: flex; align-items: center; gap: 8px; margin: 0;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              Action Required: Low Stock Alerts
            </h3>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Current Quantity</th>
                  <th>Threshold</th>
                  <th>Date Triggered</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="alertsList">
                <tr><td colspan="5" class="loading">Loading alerts...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/auth.js"></script>
  <script>
    checkAuth('admin');
    
    document.getElementById('userName').textContent = localStorage.getItem('userName');
    
    async function loadStats() {
      const response = await fetch('/api/stats', {
        headers: { 'x-session-id': localStorage.getItem('sessionId') }
      });
      const data = await response.json();
      
      if (data.status === 'success') {
        const s = data.data;
        document.getElementById('totalEmployees').textContent = s.totalEmployees;
        document.getElementById('totalItems').textContent = s.totalItems;
        document.getElementById('totalValue').textContent = '$' + s.totalValue.toLocaleString();
        document.getElementById('pendingRequests').textContent = s.pendingRequests;
      }
    }
    
    async function loadAlerts() {
      try {
        const response = await fetch('/api/admin/alerts', {
          headers: { 'x-session-id': localStorage.getItem('sessionId') }
        });
        const data = await response.json();
        
        if (data.status === 'success') {
          if (data.data.length === 0) {
            document.getElementById('alertsList').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#6b7280">No active stock alerts! Your inventory is healthy.</td></tr>';
            return;
          }
          
          const html = data.data.map(alert => `
            <tr style="background-color: #fef2f2;">
              <td><strong>${alert.item_name}</strong></td>
              <td style="color: #dc2626; font-weight: bold">${alert.current_quantity}</td>
              <td>${alert.min_quantity}</td>
              <td>${new Date(alert.created_at).toLocaleDateString()}</td>
              <td>
                <button class="btn btn-sm" style="background:#10b981; color:white; border:none; padding:4px 8px; border-radius:4px" onclick="resolveAlert('${alert.id}')">Dismiss</button>
              </td>
            </tr>
          `).join('');
          document.getElementById('alertsList').innerHTML = html;
        }
      } catch (err) {
        document.getElementById('alertsList').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red">Error loading alerts</td></tr>';
      }
    }

    async function resolveAlert(alertId) {
      if (!confirm('Dismiss this low stock alert?')) return;
      const response = await fetch(`/api/admin/alerts/${alertId}/resolve`, {
        method: 'POST',
        headers: { 'x-session-id': localStorage.getItem('sessionId') }
      });
      const data = await response.json();
      if (data.status === 'success') {
        loadAlerts();
      }
    }

    loadStats();
    loadAlerts();
  </script>
</body>
</html>
