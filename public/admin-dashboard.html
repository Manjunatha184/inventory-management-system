<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  
  
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 40px; padding: 0 8px; letter-spacing: -0.5px;">
        Inventory<span style="color: var(--primary);">Sys</span>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/admin-dashboard" class="sidebar-link active">Dashboard</a>
      <a href="/admin-employees" class="sidebar-link">Employees</a>
      <a href="/admin-inventory" class="sidebar-link">Inventory</a>
      <a href="/admin-requests" class="sidebar-link">Requests</a>
          </nav>
      <div style="margin-top: auto; padding-top: 24px;">
        <a href="#" class="sidebar-link" style="color: var(--danger);" onclick="logout()">
          <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <div>
              <h1>Dashboard</h1>
              <p>Welcome back, <strong id="userName"></strong></p>
            </div>
          </div>
        </div>
        
        <div class="grid">
          <div class="stat-card">
            <div class="stat-label">Total Employees</div>
            <div class="stat-value" id="totalEmployees">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Items</div>
            <div class="stat-value" id="totalItems">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Inventory Value</div>
            <div class="stat-value" id="totalValue">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Requests</div>
            <div class="stat-value" id="pendingRequests">-</div>
          </div>
        </div>


    </main>
  </div>
  
  <script src="/auth.js"></script>
  <script>
    checkAuth('admin');
    
    document.getElementById('userName').textContent = localStorage.getItem('userName');
    
    async function loadStats() {
      const response = await fetch('/api/stats', {
        headers: { 'x-session-id': localStorage.getItem('sessionId') }
      });
      const data = await response.json();
      
      if (data.status === 'success') {
        const s = data.data;
        document.getElementById('totalEmployees').textContent = s.totalEmployees;
        document.getElementById('totalItems').textContent = s.totalItems;
        const parsedValue = Number(s.totalValue) || 0;
        document.getElementById('totalValue').textContent = '$' + parsedValue.toLocaleString();
        document.getElementById('pendingRequests').textContent = s.pendingRequests;
      }
    }
    
    loadStats();
  </script>
</body>
</html>
