<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management - Login</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 26px;
      color: var(--text-main);
      margin-bottom: 8px;
      letter-spacing: -0.025em;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text-main);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }

    .tab-content {
      display: none;
      text-align: left;
    }

    .tab-content.active {
      display: block;
      animation: contentFadeIn 0.3s ease;
    }

    @keyframes contentFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>Inventory</h1>
        <p>Management System</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('admin')">Admin Login</button>
        <button class="tab-btn" onclick="switchTab('employee')">Employee Login</button>
      </div>

      <div id="admin" class="tab-content active">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="admin-email" placeholder="admin@company.com" value="admin@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="admin-password" placeholder="Password" value="admin123">
        </div>
        <button class="btn btn-block" onclick="loginAdmin()">Sign In as Admin</button>

      </div>

      <div id="employee" class="tab-content">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="employee-email" placeholder="employee@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="employee-password" placeholder="Password">
        </div>
        <button class="btn btn-block" onclick="loginEmployee()">Sign In as Employee</button>

      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function loginAdmin() {
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;

      try {
        const response = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (data.status === 'success') {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userRole', 'admin');
          localStorage.setItem('userName', data.user.name);
          window.location.href = '/admin-dashboard';
        } else {
          alert('Invalid credentials: ' + data.message);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    async function loginEmployee() {
      const email = document.getElementById('employee-email').value;
      const password = document.getElementById('employee-password').value;

      try {
        const response = await fetch('/api/auth/employee-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (data.status === 'success') {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userRole', 'employee');
          localStorage.setItem('userName', data.user.name);
          window.location.href = '/employee-dashboard';
        } else {
          alert('Invalid credentials: ' + data.message);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
  </script>
</body>

</html>
