<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Inventory</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  

  <div class="layout">
    
    <aside class="sidebar">
      <div class="sidebar-brand" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 40px; padding: 0 8px; letter-spacing: -0.5px;">
        Inventory<span style="color: var(--primary);">Sys</span>
      </div>
      <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 4px;">
      <a href="/admin-dashboard" class="sidebar-link">Dashboard</a>
      <a href="/admin-employees" class="sidebar-link">Employees</a>
      <a href="/admin-inventory" class="sidebar-link active">Inventory</a>
      <a href="/admin-requests" class="sidebar-link">Requests</a>
          </nav>
      <div style="margin-top: auto; padding-top: 24px;">
        <a href="#" class="sidebar-link" style="color: var(--danger);" onclick="logout()">
          <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: text-bottom; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="container">

        <div class="card">
          <div class="card-header">
            <div>
              <h1>Manage Inventory</h1>
              <p>Add and manage inventory items</p>
            </div>
            <button class="btn" onclick="openAddModal()">+ Add Item</button>
          </div>
        </div>

        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Category</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Condition</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="inventoryList">
                <tr>
                  <td colspan="6" class="loading">Loading inventory...</td>
                </tr>
              </tbody>

            </table>
          </div>
        </div>

      </div>
    </main>

  </div>


  <div class="modal" id="addModal">
    <div class="modal-content">

      <div class="modal-header">
        <h3 class="modal-title">Add New Item</h3>
      </div>

      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input type="text" id="itemName" placeholder="Laptop">
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <input type="text" id="itemCategory" placeholder="Electronics">
      </div>

      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" id="itemQty" placeholder="10">
      </div>

      <div class="form-group">
        <label class="form-label">Price</label>
        <input type="number" id="itemPrice" placeholder="1200">
      </div>

      <div class="form-group">
        <label class="form-label">Condition</label>
        <input type="text" id="itemCondition" placeholder="Good">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
        <button class="btn" onclick="createItem()">Add Item</button>
      </div>

    </div>
  </div>

  <div class="modal" id="historyModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 class="modal-title" id="historyModalTitle">Item Audit History</h3>
        <button class="btn btn-secondary btn-sm" onclick="closeHistoryModal()">Close</button>
      </div>
      <div class="table-container" style="max-height: 400px; overflow-y: auto;">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Quantity</th>
              <th>Performed By</th>
              <th>Reason</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="historyList">
            <!-- Loaded -->
          </tbody>
        </table>
      </div>
    </div>
  </div>


  <script src="/auth.js"></script>

  <script>

    checkAuth('admin');

    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('itemName').value = '';
      document.getElementById('itemCategory').value = '';
      document.getElementById('itemQty').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemCondition').value = '';
    }

    async function createItem() {

      const name = document.getElementById('itemName').value;
      const category = document.getElementById('itemCategory').value;
      const quantity = document.getElementById('itemQty').value;
      const price = document.getElementById('itemPrice').value;
      const condition = document.getElementById('itemCondition').value;

      if (!name || !category || !quantity || !price) {
        alert('Please fill all required fields');
        return;
      }

      const response = await fetch('/api/admin/inventory', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-session-id': localStorage.getItem('sessionId')
        },
        body: JSON.stringify({ name, category, quantity, price, condition })
      });

      const data = await response.json();

      if (data.status === 'success') {
        closeAddModal();
        loadInventory();
        alert('Item added successfully!');
      } else {
        alert(data.message);
      }

    }


    async function deleteItem(id) {

      if (!confirm('Are you sure you want to delete this item?')) return;

      const response = await fetch(`/api/admin/inventory/${id}`, {
        method: 'DELETE',
        headers: {
          'x-session-id': localStorage.getItem('sessionId')
        }
      });

      const data = await response.json();

      if (data.status === 'success') {
        loadInventory();
      }

    }


    async function loadInventory() {

      const response = await fetch('/api/admin/inventory', {
        headers: {
          'x-session-id': localStorage.getItem('sessionId')
        }
      });

      const data = await response.json();

      if (data.status === 'success') {

        const html = data.data.map(item => `
          <tr>
            <td><strong>${item.name}</strong></td>
            <td>${item.category}</td>
            <td>${item.quantity}</td>
            <td>$${item.price}</td>
            <td>${item.condition}</td>
            <td>
              <button class="btn btn-sm" style="margin-right: 4px; background: #3b82f6; color: white" onclick="openHistoryModal('${item.id}', '${item.name}')">Audit Log</button>
              <button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}')">Delete</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('inventoryList').innerHTML =
          html ||
          '<tr><td colspan="6" style="text-align:center; padding:20px">No items</td></tr>';

      }

    }

    function closeHistoryModal() {
      document.getElementById('historyModal').classList.remove('active');
    }

    async function openHistoryModal(itemId, itemName) {
      document.getElementById('historyModalTitle').textContent = `Audit Log: ${itemName}`;
      document.getElementById('historyList').innerHTML = '<tr><td colspan="5" class="loading">Loading...</td></tr>';
      document.getElementById('historyModal').classList.add('active');

      try {
        const response = await fetch(`/api/admin/inventory/${itemId}/history`, {
          headers: { 'x-session-id': localStorage.getItem('sessionId') }
        });
        const data = await response.json();
        
        if (data.status === 'success') {
          if (data.data.length === 0) {
            document.getElementById('historyList').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px">No transaction history</td></tr>';
            return;
          }
          
          const html = data.data.map(txn => `
            <tr>
              <td><span class="badge" style="background:#e5e7eb; color:#374151">${txn.transaction_type}</span></td>
              <td style="color: ${txn.quantity_change > 0 ? 'green' : (txn.quantity_change < 0 ? 'red' : 'inherit')}">
                <strong>${txn.quantity_change > 0 ? '+' : ''}${txn.quantity_change}</strong>
              </td>
              <td>${txn.performed_by}</td>
              <td>${txn.reason || '-'}</td>
              <td>${new Date(txn.transaction_date).toLocaleString()}</td>
            </tr>
          `).join('');
          document.getElementById('historyList').innerHTML = html;
        } else {
           document.getElementById('historyList').innerHTML = '<tr><td colspan="5" style="text-align:center; color: red;">Failed to load history</td></tr>';
        }
      } catch (err) {
        document.getElementById('historyList').innerHTML = '<tr><td colspan="5" style="text-align:center; color: red;">Failed to load history</td></tr>';
      }
    }

    loadInventory();

  </script>

</body>
</html>
