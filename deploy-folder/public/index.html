<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management - Login</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      padding: 24px;
    }
    
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header h1 {
      font-size: 28px;
      color: #73F000;
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: #64748B;
    }
    
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 2px solid #E2E8F0;
    }
    
    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 600;
      color: #94A3B8;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      margin-bottom: -2px;
    }
    
    .tab-btn.active {
      color: #73F000;
      border-bottom-color: #73F000;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .demo-box {
      background: #F8FAFC;
      border-left: 4px solid #73F000;
      padding: 16px;
      border-radius: 8px;
      margin-top: 24px;
      font-size: 13px;
    }
    
    .demo-box p {
      margin: 4px 0;
      color: #64748B;
    }
    
    .demo-box strong {
      color: #0F172A;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>Inventory</h1>
        <p>Management System</p>
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('admin')">Admin Login</button>
        <button class="tab-btn" onclick="switchTab('employee')">Employee Login</button>
      </div>
      
      <div id="admin" class="tab-content active">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="admin-email" placeholder="admin@company.com" value="admin@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="admin-password" placeholder="Password" value="admin123">
        </div>
        <button class="btn btn-block" onclick="loginAdmin()">Sign In as Admin</button>

      </div>
      
      <div id="employee" class="tab-content">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="employee-email" placeholder="employee@company.com" value="employee1@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="employee-password" placeholder="Password" value="emp123">
        </div>
        <button class="btn btn-block" onclick="loginEmployee()">Sign In as Employee</button>
    
      </div>
    </div>
  </div>
  
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }
    
    async function loginAdmin() {
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      
      try {
        const response = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        if (data.status === 'success') {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userRole', 'admin');
          localStorage.setItem('userName', data.user.name);
          window.location.href = '/admin-dashboard';
        } else {
          alert('Invalid credentials: ' + data.message);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
    
    async function loginEmployee() {
      const email = document.getElementById('employee-email').value;
      const password = document.getElementById('employee-password').value;
      
      try {
        const response = await fetch('/api/auth/employee-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        if (data.status === 'success') {
          localStorage.setItem('sessionId', data.sessionId);
          localStorage.setItem('userRole', 'employee');
          localStorage.setItem('userName', data.user.name);
          window.location.href = '/employee-dashboard';
        } else {
          alert('Invalid credentials: ' + data.message);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
  </script>
</body>
</html>
