<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Inventory</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">Inventory Management</div>
    <ul class="navbar-nav">
      <li><a href="#" onclick="logout()" class="navbar-link">Logout</a></li>
    </ul>
  </nav>

  <div class="layout">
    
    <aside class="sidebar">
      <a href="/admin-dashboard" class="sidebar-link">Dashboard</a>
      <a href="/admin-employees" class="sidebar-link">Employees</a>
      <a href="/admin-inventory" class="sidebar-link active">Inventory</a>
      <a href="/admin-requests" class="sidebar-link">Requests</a>
    </aside>

    <main class="main-content">
      <div class="container">

        <div class="card">
          <div class="card-header">
            <div>
              <h1>Manage Inventory</h1>
              <p>Add and manage inventory items</p>
            </div>
            <button class="btn" onclick="openAddModal()">+ Add Item</button>
          </div>
        </div>

        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Category</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Condition</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="inventoryList">
                <tr>
                  <td colspan="6" class="loading">Loading inventory...</td>
                </tr>
              </tbody>

            </table>
          </div>
        </div>

      </div>
    </main>

  </div>


  <div class="modal" id="addModal">
    <div class="modal-content">

      <div class="modal-header">
        <h3 class="modal-title">Add New Item</h3>
      </div>

      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input type="text" id="itemName" placeholder="Laptop">
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <input type="text" id="itemCategory" placeholder="Electronics">
      </div>

      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input type="number" id="itemQty" placeholder="10">
      </div>

      <div class="form-group">
        <label class="form-label">Price</label>
        <input type="number" id="itemPrice" placeholder="1200">
      </div>

      <div class="form-group">
        <label class="form-label">Condition</label>
        <input type="text" id="itemCondition" placeholder="Good">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
        <button class="btn" onclick="createItem()">Add Item</button>
      </div>

    </div>
  </div>


  <script src="/auth.js"></script>

  <script>

    checkAuth('admin');

    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('itemName').value = '';
      document.getElementById('itemCategory').value = '';
      document.getElementById('itemQty').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemCondition').value = '';
    }

    async function createItem() {

      const name = document.getElementById('itemName').value;
      const category = document.getElementById('itemCategory').value;
      const quantity = document.getElementById('itemQty').value;
      const price = document.getElementById('itemPrice').value;
      const condition = document.getElementById('itemCondition').value;

      if (!name || !category || !quantity || !price) {
        alert('Please fill all required fields');
        return;
      }

      const response = await fetch('/api/admin/inventory', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-session-id': localStorage.getItem('sessionId')
        },
        body: JSON.stringify({ name, category, quantity, price, condition })
      });

      const data = await response.json();

      if (data.status === 'success') {
        closeAddModal();
        loadInventory();
        alert('Item added successfully!');
      } else {
        alert(data.message);
      }

    }


    async function deleteItem(id) {

      if (!confirm('Are you sure you want to delete this item?')) return;

      const response = await fetch(`/api/admin/inventory/${id}`, {
        method: 'DELETE',
        headers: {
          'x-session-id': localStorage.getItem('sessionId')
        }
      });

      const data = await response.json();

      if (data.status === 'success') {
        loadInventory();
      }

    }


    async function loadInventory() {

      const response = await fetch('/api/admin/inventory', {
        headers: {
          'x-session-id': localStorage.getItem('sessionId')
        }
      });

      const data = await response.json();

      if (data.status === 'success') {

        const html = data.data.map(item => `
          <tr>
            <td><strong>${item.name}</strong></td>
            <td>${item.category}</td>
            <td>${item.quantity}</td>
            <td>$${item.price}</td>
            <td>${item.condition}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Delete</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('inventoryList').innerHTML =
          html ||
          '<tr><td colspan="6" style="text-align:center; padding:20px">No items</td></tr>';

      }

    }

    loadInventory();

  </script>

</body>
</html>
