<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Items</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Inventory Management</div>
    <ul class="navbar-nav">
      <li><a href="#" onclick="logout()" class="navbar-link">Logout</a></li>
    </ul>
  </nav>
  
  <div class="layout">
    <aside class="sidebar">
      <a href="/employee-dashboard" class="sidebar-link">Dashboard</a>
      <a href="/employee-inventory" class="sidebar-link">Browse Inventory</a>
      <a href="/employee-requests" class="sidebar-link">My Requests</a>
      <a href="/employee-owned" class="sidebar-link active">My Items</a>
    </aside>
    
    <main class="main-content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <div>
              <h1>My Items</h1>
              <p>Items assigned to you</p>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Serial Number</th>
                  <th>Assigned Date</th>
                </tr>
              </thead>
              <tbody id="myItemsList">
                <tr><td colspan="3" class="loading">Loading items...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/auth.js"></script>
  <script>
    checkAuth('employee');
    
    async function loadMyItems() {
      try {
        const response = await fetch('/api/employee/my-items', {
          headers: { 'x-session-id': localStorage.getItem('sessionId') }
        });
        
        const data = await response.json();
        if (data.status === 'success') {
          if (data.data.length === 0) {
            document.getElementById('myItemsList').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px">You have no items assigned</td></tr>';
            return;
          }
          const html = data.data.map(item => `
            <tr>
              <td><strong>${item.itemName}</strong></td>
              <td><span style="font-family: monospace; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 0.9em;">${item.serialNumber}</span></td>
              <td>${item.assignedDate}</td>
            </tr>
          `).join('');
          
          document.getElementById('myItemsList').innerHTML = html;
        } else {
           document.getElementById('myItemsList').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color: red;">Failed to load items.</td></tr>';
        }
      } catch (e) {
         document.getElementById('myItemsList').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px; color: red;">Failed to load items.</td></tr>';
      }
    }
    
    loadMyItems();
  </script>
</body>
</html>
